<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نشریه گیاهان دارویی | بهار ۱۴۰۵</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Vazirmatn',sans-serif;
      background:
        radial-gradient(circle at top,#f3f8ef,#dce7d5 60%,#c9d8c0);
      overflow:hidden;
      width:100vw;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      inset:0;
      background:url('https://www.transparenttextures.com/patterns/paper-fibers.png');
      opacity:0.2;
      pointer-events:none;
    }

    .viewer{
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      z-index:2;
    }

    #flipbook{
      width:95vw;
      height:92vh;
      filter:drop-shadow(0 25px 40px rgba(0,0,0,0.22));
    }

    .page{
      background:white;
      overflow:hidden;
      border-radius:4px;
    }

    .page img{
      width:100%;
      height:100%;
      object-fit:cover;
      user-select:none;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      gap:12px;
      z-index:9999;
      backdrop-filter:blur(10px);
      background:rgba(255,255,255,0.7);
      border:1px solid rgba(255,255,255,0.5);
      padding:10px 14px;
      border-radius:18px;
      box-shadow:0 8px 25px rgba(0,0,0,0.12);
    }

    .controls button{
      border:none;
      background:#1b5e3c;
      color:white;
      padding:11px 18px;
      border-radius:12px;
      cursor:pointer;
      font-family:inherit;
      font-size:14px;
      transition:0.25s;
      font-weight:600;
    }

    .controls button:hover{
      transform:translateY(-2px) scale(1.03);
      background:#2d7b53;
    }

    .page-counter{
      font-size:14px;
      color:#184c31;
      font-weight:700;
      min-width:80px;
      text-align:center;
    }

    .loading-screen{
      position:fixed;
      inset:0;
      background:linear-gradient(135deg,#eef6e7,#d7e6cf);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:99999;
      transition:0.7s;
    }

    .loading-screen.hidden{
      opacity:0;
      visibility:hidden;
    }

    .logo{
      width:130px;
      height:130px;
      border-radius:50%;
      margin-bottom:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      object-fit:cover;
    }

    .loading-title{
      font-size:34px;
      color:#14532d;
      font-weight:900;
      margin-bottom:10px;
    }

    .loading-subtitle{
      color:#487256;
      font-size:18px;
      margin-bottom:30px;
    }

    .loader{
      width:240px;
      height:10px;
      background:#c9d8c0;
      border-radius:999px;
      overflow:hidden;
      position:relative;
    }

    .loader::before{
      content:'';
      position:absolute;
      top:0;
      right:0;
      height:100%;
      width:40%;
      background:#1b5e3c;
      border-radius:999px;
      animation:loading 1.5s infinite ease-in-out;
    }

    @keyframes loading{
      0%{transform:translateX(120%)}
      100%{transform:translateX(-320%)}
    }

    .tips{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(10px);
      padding:10px 18px;
      border-radius:14px;
      color:#14532d;
      font-size:14px;
      z-index:999;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    .corner-decoration{
      position:fixed;
      width:240px;
      opacity:0.08;
      pointer-events:none;
      z-index:0;
    }

    .corner-top{
      top:-30px;
      right:-30px;
      transform:rotate(15deg);
    }

    .corner-bottom{
      bottom:-30px;
      left:-30px;
      transform:rotate(180deg);
    }

    @media(max-width:768px){
      #flipbook{
        width:100vw;
        height:86vh;
      }

      .controls{
        top:auto;
        bottom:70px;
        width:95%;
        justify-content:center;
        flex-wrap:wrap;
      }

      .controls button{
        padding:10px 14px;
        font-size:13px;
      }

      .tips{
        bottom:15px;
        width:92%;
        text-align:center;
        font-size:12px;
      }
    }
  </style>
</head>
<body>

  <img class="corner-decoration corner-top" src="https://cdn-icons-png.flaticon.com/512/415/415733.png">
  <img class="corner-decoration corner-bottom" src="https://cdn-icons-png.flaticon.com/512/415/415733.png">

  <div class="loading-screen" id="loadingScreen">
    <img class="logo" src="1000193254.jpg">
    <div class="loading-title">نشریه گیاهان دارویی</div>
    <div class="loading-subtitle">ویژه‌نامه گیاهان دارویی در زندگی مدرن — بهار ۱۴۰۵</div>
    <div class="loader"></div>
  </div>

  <div class="controls">
    <button onclick="flipPrev()">⟵ صفحه قبل</button>
    <div class="page-counter" id="pageCounter">1 / 12</div>
    <button onclick="flipNext()">صفحه بعد ⟶</button>
    <button onclick="toggleFullscreen()">⛶ تمام صفحه</button>
  </div>

  <div class="viewer">
    <div id="flipbook"></div>
  </div>

  <div class="tips">
    برای ورق زدن، صفحه را لمس کنید یا بکشید ✨
  </div>

  <script>
    const pageImages = [
      'pages/1.jpg',
      'pages/2.jpg',
      'pages/3.jpg',
      'pages/4.jpg',
      'pages/5.jpg',
      'pages/6.jpg',
      'pages/7.jpg',
      'pages/8.jpg',
      'pages/9.jpg',
      'pages/10.jpg',
      'pages/11.jpg',
      'pages/12.jpg'
    ];

    const flipbook = document.getElementById('flipbook');

    pageImages.forEach((src,index)=>{
      const page = document.createElement('div');
      page.classList.add('page');

      page.innerHTML = `
        <img src="${src}" alt="Page ${index+1}">
      `;

      flipbook.appendChild(page);
    });

    const pageFlip = new St.PageFlip(flipbook, {
      width: 600,
      height: 850,
      size: 'stretch',
      minWidth: 320,
      maxWidth: 1400,
      minHeight: 420,
      maxHeight: 1800,
      maxShadowOpacity: 0.45,
      showCover: true,
      mobileScrollSupport: false,
      swipeDistance: 35,
      drawShadow: true,
      flippingTime: 1100,
      usePortrait: true,
      autoSize: true,
      startZIndex: 10,
      startPage: 0,
      clickEventForward: true,
      useMouseEvents: true
    });

    pageFlip.loadFromHTML(document.querySelectorAll('.page'));

    const counter = document.getElementById('pageCounter');

    pageFlip.on('flip', (e) => {
      counter.innerText = `${e.data + 1} / ${pageImages.length}`;
    });

    function flipNext(){
      pageFlip.flipNext();
    }

    function flipPrev(){
      pageFlip.flipPrev();
    }

    function toggleFullscreen(){
      if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
      }else{
        document.exitFullscreen();
      }
    }

    document.addEventListener('keydown', (e)=>{
      if(e.key === 'ArrowRight') flipNext();
      if(e.key === 'ArrowLeft') flipPrev();
    });

    setTimeout(()=>{
      document.getElementById('loadingScreen').classList.add('hidden');
    },1800);
  </script>

</body>
</html>
